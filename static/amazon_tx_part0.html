<style>
/* ── Design System Tokens ───────────────────────────────────────────────── */
:root{
  /* Typography */
  --fs-filter:   16px;
  --fs-subtext:  14px;
  --fs-table:    14px;
  --fs-base:     14px;
  --fs-kpi-label:12px;
  --fs-kpi-value:26px;
  --fs-tab:      14px;
  --fs-section:  12px;
  --fs-upload:   13px;
  --fs-tag:      11px;
  --fs-map-tip:  12px;

  /* Branding & Layout */
  --color-midnight: #1e2a4a;
  --color-bg-page:  #f1f5f9;
  --color-bg-card:  #ffffff;
  --shadow-card:    0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.05);
  --radius-card:    12px;
  --brand-h:        52px;   /* fallback; overwritten by JS with exact measured height */
}

/* ── Reset & Base ───────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui,sans-serif);font-size:var(--fs-base);color:var(--color-text-primary,#111);background:var(--color-bg-page)}
.dash{padding:12px 28px 28px}

/* ── Branding Header ─────────────────────────────────────────────────────── */
.brand-header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:1001}
.brand-title{font-size:22px;font-weight:700;color:var(--color-midnight);letter-spacing:-0.3px;display:flex;align-items:center;gap:10px}
.brand-badge{display:flex;align-items:center;gap:6px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:#16a34a}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse-green 2s ease-in-out infinite}
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

/* ── Upload Box ─────────────────────────────────────────────────────────── */
.upload-box{background:var(--color-bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:20px 22px;margin-bottom:16px}
.upload-box h3{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--color-text-primary,#111)}
.drop-zone{border:2px dashed #bbb;border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fff}
.drop-zone:hover,.drop-zone.drag-over{border-color:#378ADD;background:#eef5fd}
.drop-icon{font-size:32px;margin-bottom:8px}
.drop-label{font-size:var(--fs-filter);font-weight:600;color:#222;margin-bottom:6px}
.drop-hint{font-size:var(--fs-subtext);color:#888}
.file-loaded{background:#f0faf5;border-color:#1D9E75 !important}
.file-name{font-size:var(--fs-subtext);font-weight:500;color:#0F6E56;margin-top:6px}
.upload-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.upload-row button{padding:7px 16px;font-size:var(--fs-subtext);border:0.5px solid var(--color-border-secondary,#ccc);border-radius:6px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#111);cursor:pointer}
.upload-row button:hover{background:var(--color-background-secondary,#f7f7f5)}
.btn-sample{border-color:#ccc !important}
.status{font-size:var(--fs-upload);color:var(--color-text-secondary,#666)}

/* ── Tabs ───────────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:3px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;cursor:pointer;border:0.5px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;font-size:var(--fs-tab);font-weight:500;color:var(--color-text-secondary,#666);background:transparent}
.tab.active{background:var(--color-background-primary,#fff);border-color:var(--color-border-tertiary,#e0e0e0);color:var(--color-text-primary,#111);font-weight:600;margin-bottom:-0.5px}
.panel{display:none}.panel.active{display:block}

/* ── Filters ────────────────────────────────────────────────────────────── */
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;background:var(--color-bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:12px 16px}
.filters label{font-size:var(--fs-filter);font-weight:600;color:var(--color-text-primary,#111);display:flex;flex-direction:column;gap:4px}
.filters select{font-size:var(--fs-filter);padding:5px 8px;border:0.5px solid var(--color-border-tertiary,#e0e0e0);border-radius:5px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#111)}

/* ── KPI Cards ──────────────────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:30px}
.kpi{background:var(--color-bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:16px 18px;text-align:center}
.kpi .label{font-size:var(--fs-kpi-label);font-weight:600;color:var(--color-text-secondary,#666);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.kpi .value{font-size:var(--fs-kpi-value);font-weight:600;line-height:1.1}
.kpi .sub{font-size:var(--fs-subtext);color:var(--color-text-secondary,#666);margin-top:8px}
.kpi.pos .value{color:#0F6E56}.kpi.neg .value{color:#993C1D}

/* ── Charts ─────────────────────────────────────────────────────────────── */
.chart-wrap{position:relative;width:100%;min-height:260px;background:var(--color-bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:16px}
.sec{font-size:var(--fs-section);font-weight:600;color:var(--color-text-secondary,#666);margin:20px 0 8px;letter-spacing:.5px;text-transform:uppercase}
/* Two-col cards: the column wrapper is the card; charts/tables inside are frameless */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.two-col > div{background:var(--color-bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:16px}
.two-col > div .chart-wrap{box-shadow:none;background:transparent;padding:0;border-radius:0}
.two-col > div .tbl-wrap{box-shadow:none}
.two-col > div .sec{margin-top:0}
@media(max-width:580px){.two-col{grid-template-columns:1fr}}

/* Chart legends (HTML-rendered) */
.leg{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:10px;font-size:var(--fs-subtext);color:var(--color-text-secondary,#666);align-items:center}
.ld{width:11px;height:11px;border-radius:2px;display:inline-block;margin-right:5px;flex-shrink:0;vertical-align:middle}

/* ── Tables ─────────────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;background:var(--color-bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:var(--fs-table)}
th{text-align:left;padding:9px 12px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);color:var(--color-text-secondary,#666);font-weight:600;font-size:var(--fs-subtext);white-space:nowrap}
td{padding:9px 12px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0);white-space:nowrap;font-size:var(--fs-table)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary,#f7f7f5)}

/* Type badge tags */
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:var(--fs-tag);font-weight:600}
.t-order{background:#E1F5EE;color:#0F6E56}
.t-refund{background:#FAECE7;color:#993C1D}
.t-fee{background:#FAEEDA;color:#854F0B}
.t-fba{background:#E6F1FB;color:#185FA5}
.t-adj{background:#EEEDFE;color:#534AB7}
.t-other{background:#F1EFE8;color:#5F5E5A}

/* ── Misc ────────────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:40px;color:var(--color-text-secondary,#666);font-size:var(--fs-base)}
#usaMap{width:100%;height:480px;border-radius:var(--radius-card);border:0.5px solid #e2e8f0;box-shadow:var(--shadow-card);margin-bottom:8px;position:relative;overflow:hidden;z-index:0}
/* Leaflet tooltip */
.geo-tip{background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:13px;line-height:1.6;box-shadow:0 2px 8px rgba(0,0,0,.12);pointer-events:none}
.geo-tip b{color:#111}
/* Leaflet legend */
.geo-legend{background:#fff;padding:10px 14px;border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,.15);line-height:1.4}

/* ── Smart Sticky Navigation ─────────────────────────────────────────────── */
#stickyNav{
  position:sticky;
  top:var(--brand-h);   /* locks just below the brand header */
  z-index:1000;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  margin-left:-28px;
  margin-right:-28px;
  padding:6px 28px 0;
  transition:box-shadow .25s ease;
}
#stickyNav.is-stuck{box-shadow:0 4px 6px -1px rgba(0,0,0,0.05)}
</style>

<!-- ── Branding Header ──────────────────────────────────────────────── -->
<div class="brand-header">
  <div class="brand-title">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="2"  y="13" width="4" height="9"  rx="1.5" fill="#1e2a4a"/>
      <rect x="8"  y="8"  width="4" height="14" rx="1.5" fill="#1e2a4a" opacity=".65"/>
      <rect x="14" y="4"  width="4" height="18" rx="1.5" fill="#1e2a4a" opacity=".4"/>
      <rect x="20" y="10" width="2" height="12" rx="1"   fill="#0d9488"/>
    </svg>
    Merchant Intelligence Suite
  </div>
  <div class="brand-badge">
    <span class="pulse-dot"></span>
    Operational
  </div>
</div>

<div class="dash">
<div class="upload-box">
  <h3>Load Data</h3>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
       ondragover="event.preventDefault();this.classList.add('drag-over')"
       ondragleave="this.classList.remove('drag-over')"
       ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept=".csv,.tsv,.txt,.xlsx,.xls" style="display:none" onchange="handleFileInputChange(event)">
    <div class="drop-icon">📂</div>
    <div class="drop-label">Click to browse or drag &amp; drop your file here</div>
    <div class="drop-hint">Supports: .csv &nbsp;·&nbsp; .tsv &nbsp;·&nbsp; .xlsx &nbsp;·&nbsp; .xls &nbsp;—&nbsp; Amazon Seller Central transaction export</div>
    <div class="file-name" id="fileName"></div>
  </div>
  <div class="upload-row">
    <button class="btn-sample" onclick="loadSample()">Load sample data</button>
    <span class="status" id="status">No data loaded</span>
  </div>
</div>
